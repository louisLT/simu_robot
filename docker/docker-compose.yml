# =============================================================================
# SO-ARM101 Simulation - Docker Compose
# =============================================================================

services:
  # Main simulation: Gazebo + all ROS2 nodes
  sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    image: soarm-sim:latest
    container_name: soarm-sim
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      # NVIDIA GPU support
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      # X11 forwarding for GUI (Gazebo, RViz)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Mount source for live editing (dev mode)
      - ../ros2_ws/src:/ws/ros2_ws/src:rw
      # Recordings output
      - ../recordings:/ws/recordings:rw
    # For NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    command: bash

  # RViz (optional, run with: make rviz)
  rviz:
    image: soarm-sim:latest
    container_name: soarm-rviz
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../ros2_ws/src:/ws/ros2_ws/src:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ros2 launch soarm_description rviz.launch.py
    profiles:
      - rviz
