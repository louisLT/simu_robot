# =============================================================================
# SO-ARM101 Simulation - Docker Compose
# GPU: AMD (via /dev/dri). Works with integrated and discrete AMD GPUs.
# =============================================================================

services:
  # Main simulation: Gazebo + all ROS2 nodes
  sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    image: soarm-sim:latest
    container_name: soarm-sim
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      # Mesa/AMD GPU rendering
      - LIBGL_ALWAYS_SOFTWARE=0
    volumes:
      # X11 forwarding for GUI (Gazebo, RViz)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Mount source for live editing (dev mode)
      - ../ros2_ws/src:/ws/ros2_ws/src:rw
      # Recordings output
      - ../recordings:/ws/recordings:rw
      # IK minimal example
      - ../ik_minimal_example:/ws/ik_minimal_example:rw
    # AMD GPU: pass through the DRI render devices
    devices:
      - /dev/dri:/dev/dri
    stdin_open: true
    tty: true
    command: bash

  # RViz (optional, run with: make rviz)
  rviz:
    image: soarm-sim:latest
    container_name: soarm-rviz
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../ros2_ws/src:/ws/ros2_ws/src:rw
    devices:
      - /dev/dri:/dev/dri
    command: ros2 launch soarm_description rviz.launch.py
    profiles:
      - rviz
